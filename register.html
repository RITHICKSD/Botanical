<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Elysian Gardens</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;0,800;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        :root {
            --accent-primary: #6b4e71;
            --accent-hover: #5a3d5f;
            --bg-primary: #fdfdfb;
            --bg-card: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #888;
            --border: rgba(107, 78, 113, 0.15);
            --font-body: 'Montserrat', sans-serif;
            --font-heading: 'Playfair Display', serif;
            --transition: all 0.3s ease;
        }

        [data-theme="dark"] {
            --bg-primary: #1a161d;
            --bg-card: #231e27;
            --text-primary: #f0e8f0;
            --text-secondary: #a090a8;
            --border: rgba(212, 165, 165, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            max-width: 100%;
            overflow-x: hidden;
            position: relative;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            /* Prevent blobs from causing horizontal scroll */
            transition: var(--transition);
            padding: 4rem 1rem;
            /* Provide space for scrolling items */
        }

        .bg-blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(107, 78, 113, 0.05) 0%, rgba(212, 165, 165, 0.02) 100%);
            filter: blur(80px);
            z-index: -1;
            border-radius: 50%;
            pointer-events: none;
        }

        .blob-1 {
            top: -100px;
            right: -100px;
        }

        .blob-2 {
            bottom: -100px;
            left: -100px;
        }

        .top-utils {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            display: flex;
            gap: 0.8rem;
            z-index: 100;
        }

        .util-btn {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            border: 1px solid rgba(107, 78, 113, 0.15) !important;
            background: #ffffff !important;
            color: #1a1a2e !important;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05) !important;
        }

        .util-btn:hover {
            transform: translateY(-2px);
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .auth-card {
            background: var(--bg-card);
            width: 100%;
            max-width: 480px;
            padding: 3rem;
            border-radius: 30px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            text-align: center;
            margin: 1.5rem;
            z-index: 10;
        }

        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            text-decoration: none;
            margin-bottom: 2rem;
        }

        .auth-logo i {
            font-size: 1.8rem;
            color: #6b4e71 !important;
        }

        .auth-logo span {
            font-family: var(--font-heading);
            font-size: 1.3rem;
            font-weight: 800;
            color: #6b4e71 !important;
            letter-spacing: 1px;
        }

        .auth-header h1 {
            font-family: var(--font-heading);
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            text-align: left;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.2rem;
            width: 100%;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.6rem;
            color: var(--text-secondary);
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .form-input {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 2.8rem;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.92rem;
            transition: var(--transition);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px rgba(107, 78, 113, 0.1);
        }

        .form-input:focus+i {
            color: var(--accent-primary);
        }

        .auth-btn {
            width: 100%;
            padding: 1rem;
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 1rem;
        }

        .auth-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(107, 78, 113, 0.2);
        }

        .tc-checkbox {
            display: flex;
            align-items: flex-start;
            gap: 0.8rem;
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .tc-checkbox input {
            margin-top: 0.3rem;
            accent-color: var(--accent-primary);
        }

        .tc-checkbox label {
            font-size: 0.82rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .tc-checkbox a {
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .auth-footer a {
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 700;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 500px) {
            .auth-card {
                padding: 2.5rem 1.5rem;
                border-radius: 20px;
                margin: 1rem;
                width: calc(100% - 2rem);
            }

            .auth-header h1 {
                font-size: 1.6rem;
            }

            .auth-footer {
                font-size: 0.85rem;
            }

            .auth-logo span {
                font-size: 1.1rem;
            }

            .auth-logo i {
                font-size: 1.5rem;
            }

            .auth-logo {
                gap: 0.5rem;
                margin-bottom: 1.5rem;
            }

            .top-utils {
                top: 0.8rem;
                right: 0.8rem;
            }

            .util-btn {
                width: 36px;
                height: 36px;
                border-radius: 10px;
            }
        }

        @media (max-width: 350px) {
            .auth-card {
                padding: 2rem 1rem;
            }

            .auth-header h1 {
                font-size: 1.35rem;
            }

            .auth-logo span {
                font-size: 0.95rem;
            }

            .auth-logo i {
                font-size: 1.3rem;
            }
        }
    </style>
</head>

<body>

    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="top-utils">
        <button class="util-btn" id="lang-toggle" title="Switch RTL/LTR"><i class="fas fa-globe"></i></button>
        <button class="util-btn" id="theme-toggle" title="Toggle Dark/Light"><i class="fas fa-moon"></i></button>
    </div>

    <div class="auth-card">
        <a href="index.html" class="auth-logo">
            <i class="fas fa-leaf"></i>
            <span>ELYSIAN GARDENS</span>
        </a>

        <div class="auth-header">
            <h1>Create Account</h1>
            <p>Join our sanctuary of biodiversity</p>
        </div>

        <form action="user-dashboard.html">
            <div class="form-grid">
                <div class="form-group">
                    <label>First Name</label>
                    <div class="input-wrap">
                        <input type="text" class="form-input" placeholder="Eleanor" required>
                        <i class="fas fa-user"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <div class="input-wrap">
                        <input type="text" class="form-input" placeholder="Vance" required>
                        <i class="fas fa-user-tag"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrap">
                        <input type="email" class="form-input" placeholder="eleanor@heritage.com" required>
                        <i class="fas fa-envelope"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrap">
                        <input type="password" class="form-input" placeholder="••••••••" required>
                        <i class="fas fa-lock"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm</label>
                    <div class="input-wrap">
                        <input type="password" class="form-input" placeholder="••••••••" required>
                        <i class="fas fa-shield-alt"></i>
                    </div>
                </div>
            </div>

            <div class="tc-checkbox">
                <input type="checkbox" id="terms" required>
                <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                    regarding my botanical data.</label>
            </div>

            <button type="submit" class="auth-btn">Join Sanctuary</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Sign In</a>
        </div>
    </div>

    <script>
        const html = document.documentElement;
        document.getElementById('theme-toggle').addEventListener('click', () => {
            const t = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', t);
            document.querySelector('#theme-toggle i').className = t === 'light' ? 'fas fa-moon' : 'fas fa-sun';
        });

        document.getElementById('lang-toggle').addEventListener('click', () => {
            const d = html.getAttribute('dir') === 'ltr' ? 'rtl' : 'ltr';
            html.setAttribute('dir', d);
        });
    </script>
</body>

</html>
